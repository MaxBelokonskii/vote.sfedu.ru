user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    keepalive_timeout 65;
    client_max_body_size 50m;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/atom+xml image/svg+xml;

    # -----------------------------------------------------------------------
    # Upstream: round-robin across all web replicas.
    # Docker Swarm DNS resolves "web" to all task IPs automatically.
    # -----------------------------------------------------------------------
    upstream rails_app {
        server web:3000;
        keepalive 32;
    }

    # -----------------------------------------------------------------------
    # HTTP → HTTPS redirect
    # -----------------------------------------------------------------------
    server {
        listen 80;
        server_name _;

        # Allow health checks over plain HTTP (for load balancer probes).
        location /up {
            proxy_pass         http://rails_app;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # -----------------------------------------------------------------------
    # HTTPS (SSL terminated at nginx)
    # -----------------------------------------------------------------------
    server {
        listen 443 ssl;
        server_name _;

        # --- SSL certificate paths (mount via Docker secret or volume) ---
        # Update these paths to match your certificate placement.
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # Modern TLS configuration (TLS 1.2+ only)
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       1d;
        ssl_session_tickets       off;

        # HSTS — instructs browsers to always use HTTPS for this domain.
        # max-age=63072000 = 2 years. Remove includeSubDomains if needed.
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Proxy to Rails application
        location / {
            proxy_pass         http://rails_app;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $http_host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_set_header   X-Forwarded-Ssl on;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;

            # Disable buffering for SSE / streaming responses.
            proxy_buffering    off;
        }

        # Serve Vite-compiled assets directly from nginx (bypasses Rails).
        # Mount the public/vite directory from the web service image.
        location /vite-dev/ {
            proxy_pass http://rails_app;
        }

        location /assets/ {
            proxy_pass   http://rails_app;
            expires      1y;
            add_header   Cache-Control "public, immutable";
            access_log   off;
        }
    }
}
