services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vote}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vote}
      POSTGRES_DB: ${POSTGRES_DB:-vote_production}
    ports:
      - "5432:5432"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
        until mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; do
          sleep 1;
        done;
        mc mb --ignore-existing local/$${S3_BUCKET};
        mc anonymous set download local/$${S3_BUCKET};
      "
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-vote-uploads}

  web:
    build: .
    command: bundle exec puma -p 3000 -C ./config/puma.rb
    ports:
      - "3000:3000"
    depends_on:
      - db
      - minio
      - minio-init
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-vote}:${POSTGRES_PASSWORD:-vote}@db:5432/${POSTGRES_DB:-vote_production}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      APPLICATION_HOST: ${APPLICATION_HOST}
      S3_BUCKET: ${S3_BUCKET:-vote-uploads}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_ENDPOINT: http://minio:9000
      RAILS_ENV: production

  worker:
    build: .
    command: bundle exec rake solid_queue:start
    depends_on:
      - db
      - minio
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-vote}:${POSTGRES_PASSWORD:-vote}@db:5432/${POSTGRES_DB:-vote_production}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      APPLICATION_HOST: ${APPLICATION_HOST}
      S3_BUCKET: ${S3_BUCKET:-vote-uploads}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_ENDPOINT: http://minio:9000
      RAILS_ENV: production

volumes:
  postgres_data:
  minio_data:
