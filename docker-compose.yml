services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vote}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vote}
      POSTGRES_DB: ${POSTGRES_DB:-vote_production}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vote}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    restart: on-failure
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
        mc mb --ignore-existing local/$${S3_BUCKET}
      "
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-vote-uploads}

  # Separate migration service: runs before web and worker, ensuring
  # schema is always up-to-date before any app container starts traffic.
  # This is the cornerstone of zero-downtime rolling deployments:
  # migrations run once, not inside every web replica.
  migrate:
    build: .
    command: bundle exec rails db:migrate
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-vote}:${POSTGRES_PASSWORD:-vote}@db:5432/${POSTGRES_DB:-vote_production}
      RAILS_ENV: production
    # Run once and exit — not a long-running service.
    restart: "no"

  web:
    build: .
    # Migrations are now handled by the `migrate` service.
    # Web containers boot cleanly without touching the schema.
    command: bundle exec puma -p 3000 -C ./config/puma.rb
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-vote}:${POSTGRES_PASSWORD:-vote}@db:5432/${POSTGRES_DB:-vote_production}
      S3_ENDPOINT: http://minio:9000
      RAILS_ENV: production
    # Health check against the /up endpoint (added in routes.rb).
    # Container is only marked healthy — and only receives traffic —
    # once Rails has fully booted and the DB connection is verified.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/up || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    # Allow 30 s for in-flight requests to drain on SIGTERM before
    # Docker force-kills the container (matches puma force_shutdown_after).
    stop_grace_period: 35s

  worker:
    build: .
    command: bundle exec rake solid_queue:start
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-vote}:${POSTGRES_PASSWORD:-vote}@db:5432/${POSTGRES_DB:-vote_production}
      S3_ENDPOINT: http://minio:9000
      RAILS_ENV: production
    # Give Solid Queue time to finish processing in-flight jobs before
    # the container is killed during a rolling deploy.
    stop_grace_period: 60s

volumes:
  postgres_data:
  minio_data:
