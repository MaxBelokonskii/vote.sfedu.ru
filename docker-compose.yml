services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vote}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vote}
      POSTGRES_DB: ${POSTGRES_DB:-vote_production}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vote}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
        mc mb --ignore-existing local/$${S3_BUCKET}
      "
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-vote-uploads}

  migrate:
    image: ${DOCKER_IMAGE:-vote-app:latest}
    command: bundle exec rails db:migrate
    depends_on:
      db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-vote}:${POSTGRES_PASSWORD:-vote}@db:5432/${POSTGRES_DB:-vote_production}
      RAILS_ENV: production
    restart: "no"

  web:
    image: ${DOCKER_IMAGE:-vote-app:latest}
    restart: unless-stopped
    command: bundle exec puma -p 3000 -C ./config/puma.rb
    ports:
      - "${WEB_HOST_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-vote}:${POSTGRES_PASSWORD:-vote}@db:5432/${POSTGRES_DB:-vote_production}
      S3_ENDPOINT: http://minio:9000
      RAILS_ENV: production
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/up || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    stop_grace_period: 35s

  worker:
    image: ${DOCKER_IMAGE:-vote-app:latest}
    restart: unless-stopped
    command: bundle exec rake solid_queue:start
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-vote}:${POSTGRES_PASSWORD:-vote}@db:5432/${POSTGRES_DB:-vote_production}
      S3_ENDPOINT: http://minio:9000
      RAILS_ENV: production
    stop_grace_period: 60s

volumes:
  postgres_data:
  minio_data:
